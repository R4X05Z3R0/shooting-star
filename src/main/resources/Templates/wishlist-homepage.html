<!DOCTYPE html>
<html lang="en"
        xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${wishlist.title}">Wishlist</title>
  <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>
<a th:href="@{/wishlists}">← Back to all wishlists</a>
<h1 th:text="${wishlist.title}">Wishlist title</h1>

<h2>Wishes</h2>
<table>
  <thead>
  <tr>
    <th>Title</th>
    <th>Price</th>
    <th>Description</th>
    <th>Link</th>
    <th></th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="w : ${wishes}">
    <td th:text="${w.wishTitle}"></td>
    <td th:text="${w.price}"></td>
    <td th:text="${w.description}"></td>
    <td>
      <a th:if="${w.url != null and !#strings.isEmpty(w.url)}"
         th:href="${w.url}" target="_blank">Buy</a>
    </td>
    <td>
      <a th:href="@{'/wishlists/' + ${wishlist.wishlistID} + '/wishes/' + ${w.wishId} + '/edit'}">
        <button type="button">Edit</button>
      </a>
      <form th:action="@{'/wishlists/' + ${wishlist.wishlistID} + '/wishes/' + ${w.wishId} + '/delete'}"
            method="post" style="display:inline">
        <button type="submit">Delete</button>
      </form>
    </td>
  </tr>
  <tr th:if="${#lists.isEmpty(wishes)}">
    <td colspan="5">No wishes yet. Add one below.</td>
  </tr>
  </tbody>
</table>

<h2>Add a wish</h2>
<form th:action="@{'/wishlists/' + ${wishlist.wishlistID} + '/wishes'}" method="post">
  <label for="wishTitle">Title:</label>
  <input type="text" id="wishTitle" name="wishTitle" required maxlength="50"><br>

  <label for="price">Price:</label>
  <input type="number" id="price" name="price" step="0.01" min="0"><br>

  <label for="description">Description:</label>
  <input type="text" id="description" name="description"><br>

  <label for="url">Link (URL):</label>
  <input type="url" id="url" name="url"><br>

  <button type="submit">Save wish</button>
</form>
</body>
</html>
