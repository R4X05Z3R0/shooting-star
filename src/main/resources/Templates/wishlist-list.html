	<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Wishlists</title>
    <link th:href="@{/main.css}" rel="stylesheet">
</head>
<body>
<h1>My Wishlists</h1>

<a th:href="@{/wishlists/new}">
    <button type="button">+ Create new wishlist</button>
</a>

<hr>
<ul>
	<li th:each="wl : ${wishlists}">
		<a th:href="@{/wishlists/{id}(id=${wl.wishlistID})}"
		   th:text="${wl.title}">Title</a>

		<a th:href="@{/wishlists/{id}/edit(id=${wl.wishlistID})}">
			Rename
		</a>

		<form th:action="@{/wishlists/{id}/delete(id=${wl.wishlistID})}"
		      method="post" style="display:inline">
			<button type="submit"
			        onclick="return confirm('Delete this wishlist?')">
				Delete
			</button>
		</form>
	</li>

	<li th:if="${#lists.isEmpty(wishlists)}">
		No wishlists yet. Create one above.
	</li>
</ul>

</body>
</html>
