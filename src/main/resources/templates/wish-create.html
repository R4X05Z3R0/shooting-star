<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Make a Wish | Shooting Star</title>
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<link rel="stylesheet" th:href="@{/css/wish-create.css}">
</head>
<body>

<nav class="main-nav">
	<div class="nav-container">
		<div class="nav-left">
			<a th:href="@{/shootingstar/}" class="nav-logo">Shooting Star</a>
			<a th:href="@{/wishlists/}" class="nav-link">Dashboard</a>
		</div>

		<form method="post" th:action="@{/auth/logout}" class="logout-form">
			<button type="submit" class="logout-btn">Log Out</button>
		</form>
	</div>
</nav>

<header class="user-hero">
	<h1>Make a Wish</h1>
	<p class="subtitle">A new star for your collection.</p>
</header>

<div class="notebook-page expanded-card">
	<form th:action="@{/wishlists/{id}/wishes/create(id=${wish.wishlistId})}"
	      th:object="${wish}"
	      method="post"
	      class="create-form">

		<div class="input-group">
			<label>Wish Title</label>
			<input type="text" th:field="*{wishTitle}" required placeholder="What are you wishing for?">
		</div>

		<div class="input-row">
			<div class="input-group">
				<label>Price</label>
				<input type="number" step="0.01" th:field="*{price}" placeholder="0.00">
			</div>
			<div class="input-group">
				<label>Link (URL)</label>
				<input type="text" th:field="*{url}" placeholder="https://...">
			</div>
		</div>

		<div class="input-group">
			<label>Description</label>
			<textarea th:field="*{description}" rows="4" placeholder="What does it mean to you?"></textarea>
		</div>

		<div class="input-group">
			<label>Image URL</label>
			<input type="text" th:field="*{imageUrl}" placeholder="What does it look like? Don't be shy! Paste the image link!">
		</div>

		<input type="hidden" th:field="*{wishlistId}">

		<div class="form-actions">
			<button type="submit" class="main-button">Make a Wish!</button>
			<a th:href="@{/wishlists/{id}(id=${wish.wishlistId})}" class="cancel-link">Cancel</a>
		</div>
	</form>
</div>

</body>
</html>
