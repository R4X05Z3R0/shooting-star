<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Sign Up</title>
</head>
<body>

<h2>Create Account</h2>

<form th:method="post" th:action="@{/shootingstar/users/create}" th:object="${user}">

	<label>Name</label><br>
	<input type="text" name="name" th:field="*{name}" required>
	<br><br>

	<label>Username</label><br>
	<input type="text" name="username" th:field="*{username}" required>
	<br><br>

	<label>Password</label><br>
	<input type="password" name="password" th:field="*{password}" required>
	<br><br>

	<label>Email</label><br>
	<input type="email" name="email" th:field="*{email}" required>
	<br><br>

	<button type="submit">Complete</button>

</form>

<hr>

<p>Already have an account?</p>
<a th:href="@{/shootingstar/login}">Go to Login</a>

</body>
</html>
