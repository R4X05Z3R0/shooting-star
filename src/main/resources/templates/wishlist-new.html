<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>New Wishlist | Shooting Star</title>
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<link rel="stylesheet" th:href="@{/css/wishlist-new.css}">
</head>
<body>

<nav class="main-nav">
	<div class="nav-container">
		<div class="nav-left">
			<a th:href="@{/shootingstar/}" class="nav-logo">Shooting Star</a>
			<a th:href="@{/wishlists/}" class="nav-link">Dashboard</a>
		</div>

		<form method="post" th:action="@{/auth/logout}" class="logout-form">
			<button type="submit" class="logout-btn">Log Out</button>
		</form>
	</div>
</nav>

<header class="user-hero">
	<h1>New Wishlist</h1>
	<p class="subtitle">Name your next constellation.</p>
</header>

<div class="notebook-page expanded-card">
	<form th:action="@{/wishlists/create}" method="post" class="create-form">
		<div class="input-group">
			<label for="title">Wishlist Title</label>
			<input type="text" id="title" name="title" required maxlength="50" placeholder="e.g. Krabby Patty Secret Formula, Death Star plans...">
		</div>

		<div class="form-actions">
			<button type="submit" class="main-button">Save Wishlist</button>
			<a th:href="@{/wishlists/}" class="cancel-link">Cancel</a>
		</div>
	</form>
</div>

</body>
</html>
